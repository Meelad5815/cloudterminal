apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudterminal-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cloudterminal-backend
  template:
    metadata:
      labels:
        app: cloudterminal-backend
    spec:
      containers:
        - name: backend
          image: your-registry/cloudterminal-backend:latest
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          env:
            - name: TERMINAL_IMAGE
              value: cloudterminal-user
            - name: CONTAINER_CPU_LIMIT
              value: "1"
            - name: CONTAINER_MEMORY_LIMIT
              value: "512m"
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cloudterminal-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cloudterminal-backend
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
